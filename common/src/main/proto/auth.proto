syntax = "proto3";

import "common.proto";

option java_package = "com.health.grpc.auth";
option java_outer_classname = "AuthProto";
option java_multiple_files = true;

// Shared messages for JWT-based Authentication

message TokenRequest {
}

message TokenResponse {
  bool          success       = 1;
  string        access_token  = 2;
  string        refresh_token = 3;
  string        message       = 4;

  oneof user_info {
    DoctorMessage  doctor  = 5;
    PatientMessage patient = 6;
  }
}

message PatientMessage {
  string patient_id = 1;
  string name       = 2;
  string email      = 3;
  string phone      = 4;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool   valid   = 1;
  string user_id = 2;
  string role    = 3;
  string message = 4;
}
