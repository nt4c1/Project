syntax = "proto3";

option java_package = "com.health.grpc.notification";
option java_outer_classname = "NotificationProto";
option java_multiple_files = true;

// Published via NATS — no gRPC service needed

message AppointmentBookedEvent {
  string appointment_id = 1;
  string doctor_id      = 2;
  string patient_id     = 3;
  string date           = 4;
  string time           = 5;
}

message AppointmentAcceptedEvent {
  string appointment_id = 1;
  string doctor_id      = 2;
  string patient_id     = 3;
  string date           = 4;
  string time           = 5;
}

message AppointmentPostponedEvent {
  string appointment_id = 1;
  string doctor_id      = 2;
  string patient_id     = 3;
  string old_date       = 4;
  string new_date       = 5;
  string time           = 6;
}

message AppointmentCancelledEvent {
  string appointment_id = 1;
  string doctor_id      = 2;
  string patient_id     = 3;
  string date           = 4;
  string time           = 5;
  string cancelled_by   = 6;  // DOCTOR | PATIENT
}