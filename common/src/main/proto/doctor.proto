syntax = "proto3";

import "common.proto";
import "auth.proto";

option java_package = "com.health.grpc.doctor";
option java_outer_classname = "DoctorProto";
option java_multiple_files = true;

service DoctorGrpcService {

  rpc RefreshToken (RefreshTokenRequest) returns (TokenResponse);

  // Doctor Management
  rpc CreateDoctor (CreateDoctorRequest) returns (CreateDoctorResponse);
  rpc UpdateDoctor (UpdateDoctorRequest) returns (UpdateDoctorResponse);
  rpc DeleteDoctor (DeleteDoctorRequest) returns (DeleteDoctorResponse);

  rpc UpdateDoctorLocation (UpdateDoctorLocationRequest) returns (UpdateDoctorLocationResponse);

  // Schedule
  rpc CreateSchedule (CreateScheduleRequest) returns (CreateScheduleResponse);
  rpc UpdateSchedule (UpdateScheduleRequest) returns (UpdateScheduleResponse);
  rpc GetDoctorSchedule (GetScheduleRequest) returns (GetScheduleResponse);

  // Override / Block (Self management)
  rpc AddScheduleOverride (AddOverrideRequest) returns (AddOverrideResponse);
  rpc AddUnavailability (AddUnavailabilityRequest) returns (AddUnavailabilityResponse);

  // Appointments (Workflow)
  rpc AcceptAppointment (AcceptAppointmentRequest) returns (AcceptAppointmentResponse);
  rpc PostponeAppointment (PostponeAppointmentRequest) returns (PostponeAppointmentResponse);
  rpc CompleteAppointment (CompleteAppointmentRequest) returns (CompleteAppointmentResponse);
  rpc MarkNoShow (MarkNoShowRequest) returns (MarkNoShowResponse);

  // Queries
  rpc GetDoctor (GetDoctorRequest) returns (GetDoctorResponse);
  rpc GetDoctorsByLocation (LocationSearchRequest) returns (FindNearByDoctorResponse);

  rpc GetDoctorAppointments (GetDoctorAppointmentsRequest) returns (GetDoctorAppointmentsResponse);
  rpc GetAppointmentsByStatus (GetByStatusRequest) returns (GetDoctorAppointmentsResponse);

  rpc IsDoctorActive (IsActiveRequest) returns (DoctorActiveResponse);

  rpc GetReviews (GetReviewsRequest) returns (GetReviewsResponse);

  rpc ForgotPassword (ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse);

}

message CreateDoctorRequest {
  string          name           = 1;
  repeated string clinic_ids     = 2; // Optional, can be individual
  string          type           = 3; // INDIVIDUAL | CLINIC_DOCTOR
  string          specialization = 4;
  string          email          = 5;
  string          password       = 6;
  string          phone          = 7;
}

message CreateDoctorResponse {
  DoctorMessage doctor  = 1;
  string        message = 2;
}

message UpdateDoctorRequest {
  string doctor_id = 1;
  string email     = 2;
  string password  = 3;
  string phone     = 4;
}

message UpdateDoctorResponse {
  bool   success = 1;//TODO Exception handling is already being done so what it's use
  string message = 2;
  DoctorMessage doctor = 3;
}

message DeleteDoctorRequest {
  string doctor_id = 1;
  string email     = 2;
  string password  = 3;
}

message DeleteDoctorResponse {
  bool   success = 1;
  string message = 2;
}

message UpdateDoctorLocationRequest {
  string doctor_id     = 1;
  string clinic_id     = 2;
  string location_text = 3;
}

message UpdateDoctorLocationResponse {
  bool   success = 1;
  string message = 2;
}

message CreateScheduleRequest {
  ScheduleMessage schedule = 1;
}

message CreateScheduleResponse {
  bool   success = 1;
  string message = 2;
}

message UpdateScheduleRequest {
  ScheduleMessage schedule = 1;
}

message UpdateScheduleResponse {
  bool   success = 1;
  string message = 2;
}

message GetScheduleRequest {
  string doctor_id = 1;
  string clinic_id = 2;
}

message GetScheduleResponse {
  ScheduleMessage schedule = 1;
}

message AddOverrideRequest {
  string doctor_id    = 1;
  string date         = 2; // ISO Date
  bool   is_available = 3;
  string start_time   = 4; // HH:mm
  string end_time     = 5;
  int32  max_appts    = 6;
  string reason       = 7;
}

message AddOverrideResponse {
  bool   success = 1;
  string message = 2;
}

message AddUnavailabilityRequest {
  string doctor_id  = 1;
  string start_date = 2;
  string end_date   = 3;
  string reason     = 4;
}

message AddUnavailabilityResponse {
  bool   success = 1;
  string message = 2;
}

message AcceptAppointmentRequest {
  string appointment_id = 1;
}

message AcceptAppointmentResponse {
  bool   success = 1;
  string message = 2;
}

message PostponeAppointmentRequest {
  string appointment_id = 1;
  string new_date       = 2;
  string new_time       = 3;
}

message PostponeAppointmentResponse {
  bool   success = 1;
  string message = 2;
}

message CompleteAppointmentRequest {
  string appointment_id = 1;
  string doctor_notes   = 2;
}

message CompleteAppointmentResponse {
  bool   success = 1;
  string message = 2;
}

message MarkNoShowRequest {
  string appointment_id = 1;
}

message MarkNoShowResponse {
  bool   success = 1;
  string message = 2;
}

message GetDoctorRequest {
  string doctor_id = 1;
}

message GetDoctorResponse {
  DoctorMessage doctor = 1;
}

message FindNearByDoctorResponse {
  repeated DoctorMessage doctors = 1;
}

message GetDoctorAppointmentsRequest {
  string doctor_id = 1;
}

message GetDoctorAppointmentsResponse {
  repeated AppointmentMessage appointments = 1;
}

message GetByStatusRequest {
  string doctor_id = 1;
  string status    = 2;
  string date      = 3;
}

message IsActiveRequest {
  string doctor_id = 1;
  string clinic_id = 2;
}

message DoctorActiveResponse {
  bool   isActive = 1;
  string message  = 2;
}

message GetReviewsRequest {
  string doctor_id = 1;
}

message GetReviewsResponse {
  repeated ReviewMessage reviews = 1;
  double average_rating = 2;
}
