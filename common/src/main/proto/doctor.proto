syntax = "proto3";

import "auth.proto";
import "common.proto";

option java_package = "com.health.grpc.doctor";
option java_outer_classname = "DoctorProto";
option java_multiple_files = true;

service DoctorGrpcService {

  // Auth
  rpc GenerateToken             (TokenRequest)          returns (TokenResponse);
  rpc ValidateDoctorToken      (ValidateTokenRequest)        returns (ValidateTokenResponse);
  rpc ForgotPassword           (ForgotPasswordRequest)        returns (ForgotPasswordResponse);
  rpc ResetPassword            (ResetPasswordRequest)         returns (ResetPasswordResponse);

  // Doctor management
  rpc CreateDoctor             (CreateDoctorRequest)         returns (CreateDoctorResponse);
  rpc GetDoctor                (GetDoctorRequest)            returns (GetDoctorResponse);
  rpc DoctorActive             (DoctorActiveRequest)         returns (DoctorActiveResponse);
  rpc UpdateLocation           (UpdateLocationRequest)       returns (UpdateLocationResponse);
  rpc UpdateDoctor             (UpdateDoctorRequest)         returns (UpdateDoctorResponse);
  rpc AddClinic                (AddClinicRequest)            returns (AddClinicResponse);
  rpc RemoveClinic             (RemoveClinicRequest)         returns (RemoveClinicResponse);
  rpc DeleteDoctor             (DeleteDoctorRequest)         returns (DeleteDoctorResponse);

  // Schedule
  rpc CreateSchedule           (CreateScheduleRequest)       returns (CreateScheduleResponse);
  rpc UpdateSchedule           (UpdateScheduleRequest)       returns (UpdateScheduleResponse);
  rpc GetDoctorSchedule        (GetScheduleRequest)          returns (GetScheduleResponse);

  // Reviews
  rpc AddReview                (AddReviewRequest)            returns (AddReviewResponse);
  rpc GetDoctorReviews         (GetReviewsRequest)           returns (GetReviewsResponse);

  // Location search
  rpc GetDoctorsByLocation     (LocationSearchRequest)       returns (NearbyDoctorsResponse);

  // Appointments
  rpc GetAppointments          (GetAppointmentsRequest)      returns (GetAppointmentsResponse);
  rpc GetPendingAppointments   (GetAppointmentsRequest)      returns (GetAppointmentsResponse);
  rpc AcceptAppointment        (AppointmentActionRequest)    returns (AppointmentActionResponse);
  rpc PostponeAppointment      (AppointmentActionRequest)    returns (AppointmentActionResponse);
  rpc CompleteAppointment      (AppointmentActionRequest)    returns (AppointmentActionResponse);
  rpc NoShowAppointment        (AppointmentActionRequest)    returns (AppointmentActionResponse);
  rpc CancelAppointment        (CancelAppointmentRequest)    returns (CancelAppointmentResponse);
}

// ── Doctor ─────────────────────────────────────────────────

message CreateDoctorRequest {
  string         name = 1;
  repeated string clinic_ids = 2;
  DoctorType     type = 3;
  string         specialization = 4;
  string         email = 5;
  string         password = 6;
  string         phone = 7;
}
message CreateDoctorResponse {DoctorMessage doctor = 1; string message = 2;}

message GetDoctorRequest  {string doctor_id = 1;}
message GetDoctorResponse {DoctorMessage doctor = 1;}

message DoctorActiveRequest {
  string doctor_id = 1;
  string clinic_id = 2;
}

message DoctorActiveResponse {
  bool   is_active = 1;
  string message = 2;
}

message UpdateLocationRequest  {string doctor_id = 1; string clinic_id = 2; string location_text = 3;}
message UpdateLocationResponse {bool success = 1; string message = 2;}

message UpdateDoctorRequest {
  string email = 1;
  string password = 2;
  string doctor_id = 3;
  string phone = 4;
}

message UpdateDoctorResponse {
  string message = 1;
  DoctorMessage doctor = 2;
}

message AddClinicRequest {
  string doctor_id = 1;
  repeated string clinic_ids = 2;
}

message AddClinicResponse {
  bool success = 1;
  string message = 2;
}

message RemoveClinicRequest {
  string doctor_id = 1;
  repeated string clinic_ids = 2;
}

message RemoveClinicResponse {
  bool success = 1;
  string message = 2;
}

message DeleteDoctorRequest {
  string email = 1;
  string password = 2;
  string doctor_id = 3;
}

message DeleteDoctorResponse{
  string message = 1;
}

// ── Schedule ───────────────────────────────────────────────

message CreateScheduleRequest {
  string          doctor_id = 1;
  string          clinic_id = 2;
  repeated string working_days = 3;
  string          start_time = 4;
  string          end_time = 5;
  int32           slot_duration_minutes = 6;
  int32           max_appointments_day = 7;
}
message CreateScheduleResponse {string message = 1;}

message UpdateScheduleRequest {
  string          doctor_id = 1;
  string          clinic_id = 2;
  repeated string working_days = 3;
  string          start_time = 4;
  string          end_time = 5;
  int32           slot_duration_minutes = 6;
  int32           max_appointments_day = 7;
}

message UpdateScheduleResponse {
  string message = 1;
}

message GetScheduleRequest  {string doctor_id = 1; string clinic_id = 2;}
message GetScheduleResponse {
  string          doctor_id = 1;
  repeated string working_days = 2;
  string          start_time = 3;
  string          end_time = 4;
  int32           slot_duration_minutes = 5;
  int32           max_appointments_day = 6;
}

// ── Location ───────────────────────────────────────────────

message NearbyDoctorsResponse {repeated DoctorMessage doctors = 1;}

// ── Appointments ───────────────────────────────────────────

message CancelAppointmentRequest {
  string appointment_id = 1;
  string patient_id = 2;
  string doctor_id = 3;
  string date = 4;
  string time = 5;
  string cancellation_reason = 6;
}
message CancelAppointmentResponse {bool success = 1; string message = 2;}

message GetAppointmentsRequest  {string doctor_id = 1; string date = 2;}
message GetAppointmentsResponse {repeated AppointmentMessage appointments = 1;}

message AppointmentActionRequest {
  string            appointment_id = 1;
  string            doctor_id = 2;
  string            patient_id = 3;
  string            date = 4;
  string            time = 5;
  AppointmentStatus status = 6;
  string            meeting_link = 7;
}
message AppointmentActionResponse {bool success = 1; string message = 2;}

// ── Reviews ───────────────────────────────────────────────

message ReviewMessage {
  string doctor_id = 1;
  string patient_id = 2;
  string patient_name = 3;
  int32  rating = 4; // 1-5
  string comment = 5;
  string created_at = 6;
}

message AddReviewRequest {
  string doctor_id = 1;
  string patient_id = 2;
  int32  rating = 3;
  string comment = 4;
}

message AddReviewResponse {
  bool   success = 1;
  string message = 2;
  double average_rating = 3;
}

message GetReviewsRequest {
  string doctor_id = 1;
}

message GetReviewsResponse {
  repeated ReviewMessage reviews = 1;
  double average_rating = 2;
}
