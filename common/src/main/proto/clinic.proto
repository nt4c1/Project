syntax = "proto3";

import "common.proto";
import "auth.proto";

option java_package = "com.health.grpc.clinic";
option java_outer_classname = "ClinicProto";
option java_multiple_files = true;


service ClinicGrpcService {

  rpc RefreshToken (RefreshTokenRequest) returns (TokenResponse);

  rpc GetClinicStats (GetClinicStatsRequest) returns (GetClinicStatsResponse);

  // Management
  rpc CreateClinic (CreateClinicRequest) returns (CreateClinicResponse);
  rpc UpdateClinic (UpdateClinicRequest) returns (UpdateClinicResponse);
  rpc DeleteClinic (DeleteClinicRequest) returns (DeleteClinicResponse);

  rpc UpdateClinicLocation (UpdateClinicLocationRequest) returns (UpdateClinicLocationResponse);

  rpc GetDoctorsByClinic (GetByClinicRequest) returns (GetByClinicResponse);

  rpc GetClinicsByLocation (LocationSearchRequest) returns (FindNearByClinicResponse);

  rpc SearchClinics (SearchClinicRequest) returns (SearchClinicResponse);

  rpc AddDoctorToClinic (AddDoctorToClinicRequest) returns (AddDoctorToClinicResponse);
  rpc RemoveDoctorFromClinic (RemoveDoctorFromClinicRequest) returns (RemoveDoctorFromClinicResponse);

  rpc ForgotPassword (ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse);

}

message GetClinicStatsRequest {
  string clinic_id = 1;
}

message GetClinicStatsResponse {
  int64 total_doctors      = 1;
  int64 total_patients     = 2;
  int64 total_appointments = 3;
  string message           = 4;
}

message CreateClinicRequest {
  string name          = 1;
  string location_text = 2;
  string email         = 3;
  string password      = 4;
  string phone         = 5;
}

message CreateClinicResponse {
  ClinicMessage clinic  = 1;
  string        message = 2;
}

message UpdateClinicRequest {
  string clinic_id = 1;
  string name      = 2;
}

message UpdateClinicResponse {
  bool   success = 1;
  string message = 2;
}

message DeleteClinicRequest {
  string clinic_id = 1;
}

message DeleteClinicResponse {
  bool   success = 1;
  string message = 2;
}

message UpdateClinicLocationRequest {
  string clinic_id     = 1;
  string location_text = 2;
}

message UpdateClinicLocationResponse {
  bool   success = 1;
  string message = 2;
}

message GetByClinicRequest {
  string clinic_id = 1;
}

message GetByClinicResponse {
  repeated DoctorMessage doctors = 1;
}

message FindNearByClinicResponse {
  repeated ClinicMessage clinics = 1;
}

message SearchClinicRequest {
  string name = 1;
  int32  page = 2;
  int32  size = 3;
}

message SearchClinicResponse {
  repeated ClinicMessage clinics        = 1;
  int32                  total_pages    = 2;
  int64                  total_elements = 3;
}

message AddDoctorToClinicRequest {
  string clinic_id = 1;
  string doctor_id = 2;
}

message AddDoctorToClinicResponse {
  bool   success = 1;
  string message = 2;
}

message RemoveDoctorFromClinicRequest {
  string clinic_id = 1;
  string doctor_id = 2;
}

message RemoveDoctorFromClinicResponse {
  bool   success = 1;
  string message = 2;
}
