syntax = "proto3";

option java_package = "com.health.grpc.common";
option java_outer_classname = "CommonProto";
option java_multiple_files = true;

enum DoctorType {
  DOCTOR_TYPE_UNSPECIFIED = 0;
  DOCTOR_TYPE_INDIVIDUAL       = 1;
  DOCTOR_TYPE_CLINIC_DOCTOR    = 2;
}

enum AppointmentStatus {
  APPOINTMENT_STATUS_UNSPECIFIED = 0;
  APPOINTMENT_STATUS_PENDING            = 1;
  APPOINTMENT_STATUS_ACCEPTED           = 2;
  APPOINTMENT_STATUS_CANCELLED          = 3;
  APPOINTMENT_STATUS_POSTPONED          = 4;
  APPOINTMENT_STATUS_COMPLETED          = 5;
  APPOINTMENT_STATUS_NO_SHOW            = 6;
}

message DoctorMessage {
  string         doctor_id          = 1;
  string         name               = 2;
  DoctorType     type               = 3;
  string         specialization     = 4;
  bool           is_active          = 5;
  repeated string clinic_ids        = 6;
  double         distance           = 7;
  string         phone              = 8;
  string         next_possible_date = 10;
  double         average_rating     = 11;
  int32          review_count       = 12;
}

message ClinicMessage {
  string clinic_id     = 1;
  string name          = 2;
  string location_text = 3;
}

message PatientMessage {
  string patient_id = 1;
  string name       = 2;
  string email      = 3;
  string phone      = 4;
}

enum AvailabilityFilter {
  AVAILABILITY_FILTER_UNSPECIFIED = 0;
  AVAILABILITY_FILTER_NOW = 1;
  AVAILABILITY_FILTER_THIS_WEEKEND = 2;
}

message LocationSearchRequest {
  string location = 1;
  AvailabilityFilter filter = 2;
}

message AppointmentMessage {
  string            appointment_id      = 1;
  string            doctor_id           = 2;
  string            patient_id          = 3;
  string            date                = 4;
  string            time                = 5;
  AppointmentStatus status              = 6;
  string            patient_name        = 7;
  string            patient_phone       = 8;
  string            doctor_name         = 9;
  string            clinic_name         = 10;
  string            reason_for_visit    = 11;
  string            cancellation_reason = 12;
  string            clinic_id           = 13;
  string            meeting_link        = 14;
}

message ScheduleMessage {
  string doctor_id = 1;
  string clinic_id = 2;
  repeated string working_days = 3;
  string start_time = 4;
  string end_time = 5;
  int32 slot_duration_minutes = 6;
  int32 max_appointments_day = 7;
}

message ReviewMessage {
  string doctor_id = 1;
  string patient_id = 2;
  string patient_name = 3;
  int32 rating = 4;
  string comment = 5;
  string created_at = 6;
}
