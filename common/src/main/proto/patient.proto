syntax = "proto3";

import "common.proto";
import "auth.proto";

option java_package = "com.health.grpc.patient";
option java_outer_classname = "PatientProto";
option java_multiple_files = true;

service PatientGrpcService {

  rpc RefreshToken (RefreshTokenRequest) returns (TokenResponse);

  // Registration / Profile
  rpc RegisterPatient (RegisterPatientRequest) returns (RegisterPatientResponse);
  rpc UpdatePatient (UpdatePatientRequest) returns (UpdatePatientResponse);
  rpc DeletePatient (DeletePatientRequest) returns (DeletePatientResponse);

  rpc GetPatient (GetPatientRequest) returns (GetPatientResponse);
  rpc PatientExists (PatientExistsRequest) returns (PatientExistsResponse);

  // Appointment Workflow (Patient Side)
  rpc BookAppointment (BookAppointmentRequest) returns (BookAppointmentResponse);
  rpc CancelAppointment (CancelAppointmentRequest) returns (CancelAppointmentResponse);

  // Queries
  rpc GetMyAppointments (MyAppointmentsRequest) returns (MyAppointmentsResponse);

  // Discovery Proxies (Delegated to Doctor Module)
  rpc GetDoctorsByLocation (LocationSearchRequest) returns (NearbyDoctorsResponse);
  rpc GetDoctorSchedule (ScheduleProxyRequest) returns (ScheduleProxyResponse);

  // Reviews
  rpc AddReview (AddReviewRequest) returns (AddReviewResponse);

  rpc ForgotPassword (ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse);

  rpc ValidatePatientToken (ValidateTokenRequest) returns (ValidateTokenResponse);

}

message RegisterPatientRequest {
  string name     = 1;
  string email    = 2;
  string phone    = 3;
  string password = 4;
}

message RegisterPatientResponse {
  bool   success    = 1;
  string patient_id = 2;
  string message    = 3;
}

message UpdatePatientRequest {
  string patient_id = 1;
  string name       = 2;
  string phone      = 3;
  string email      = 4;
  string password   = 5;
}

message UpdatePatientResponse {
  bool   success    = 1;
  string patient_id = 2;
  string message    = 3;
}

message DeletePatientRequest {
  string patient_id = 1;
  string email = 2;
  string password = 3;
}

message DeletePatientResponse {
  bool   success = 1;
  string message = 2;
}

message GetPatientRequest {
  string patient_id = 1;
}

message GetPatientResponse {
  string patient_id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
}

message PatientExistsRequest {
  string patient_id = 1;
}

message PatientExistsResponse {
  bool exists = 1;
}

message BookAppointmentRequest {
  string doctor_id        = 1;
  string clinic_id        = 2;
  string date             = 3; // ISO Date
  string time             = 4; // HH:mm
  string reason_for_visit = 5;
  string patient_id       = 6;
}

message BookAppointmentResponse {
  bool   success        = 1;
  string appointment_id = 2;
  string message        = 3;
}

message CancelAppointmentRequest {
  string appointment_id      = 1;
  string patient_id          = 2;
  string doctor_id           = 3;
  string date                = 4;
  string time                = 5;
  string cancellation_reason = 6;
}

message CancelAppointmentResponse {
  bool   success = 1;
  string message = 2;
}

message MyAppointmentsRequest {
  string patient_id = 1;
  string date       = 2;
}

message MyAppointmentsResponse {
  repeated .AppointmentMessage appointments = 1;
}

message NearbyDoctorsResponse {
  repeated .DoctorMessage doctors = 1;
}

message ScheduleProxyRequest {
  string doctor_id = 1;
  string clinic_id = 2;
}

message ScheduleProxyResponse {
  repeated string working_days = 1;
  string start_time = 2;
  string end_time = 3;
  int32 slot_duration_minutes = 4;
  int32 max_appointments_day = 5;
}

message AddReviewRequest {
  string doctor_id = 1;
  string patient_id = 2;
  int32  rating    = 3;
  string comment   = 4;
}

message AddReviewResponse {
  bool   success = 1;
  string message = 2;
  double average_rating = 3;
}
