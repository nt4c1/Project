syntax = "proto3";

import "auth.proto";

option java_package = "com.health.grpc.doctor";
option java_outer_classname = "DoctorProto";
option java_multiple_files = true;

service DoctorGrpcService {

  // Auth
  rpc DoctorLogin         (DoctorLoginRequest)     returns (DoctorLoginResponse);
  rpc ValidateDoctorToken (ValidateTokenRequest)   returns (ValidateTokenResponse);  // ← from auth.proto

  // Doctor management
  rpc CreateDoctor        (CreateDoctorRequest)    returns (CreateDoctorResponse);
  rpc GetDoctor           (GetDoctorRequest)       returns (GetDoctorResponse);
  rpc DoctorExists        (DoctorExistsRequest)    returns (DoctorExistsResponse);
  rpc UpdateLocation      (UpdateLocationRequest)  returns (UpdateLocationResponse);

  // Clinic
  rpc CreateClinic        (CreateClinicRequest)    returns (CreateClinicResponse);
  rpc GetDoctorsByClinic  (GetByClinicRequest)     returns (GetByClinicResponse);

  // Schedule
  rpc CreateSchedule      (CreateScheduleRequest)  returns (CreateScheduleResponse);
  rpc GetDoctorSchedule   (GetScheduleRequest)     returns (GetScheduleResponse);

  // Location search
  rpc GetNearbyDoctors     (NearbyDoctorsRequest)  returns (NearbyDoctorsResponse);
  rpc GetDoctorsByLocation (ByLocationRequest)     returns (ByLocationResponse);

  // Appointments
  rpc CreateAppointment    (CreateAppointmentRequest)  returns (CreateAppointmentResponse);
  rpc CancelAppointment    (CancelAppointmentRequest)  returns (CancelAppointmentResponse);
  rpc GetAppointments      (GetAppointmentsRequest)    returns (GetAppointmentsResponse);
  rpc GetPendingAppointments(GetAppointmentsRequest)   returns (GetAppointmentsResponse);
  rpc GetMyAppointments    (GetMyAppointmentsRequest)  returns (GetMyAppointmentsResponse);
  rpc AcceptAppointment    (AppointmentActionRequest)  returns (AppointmentActionResponse);
  rpc PostponeAppointment  (AppointmentActionRequest)  returns (AppointmentActionResponse);
}

// ── Auth ─────────────────────────────────────
// ValidateTokenRequest and ValidateTokenResponse come from auth.proto

message DoctorLoginRequest  { string email = 1; string password = 2; }
message DoctorLoginResponse {
  bool   success       = 1;
  string access_token  = 2;
  string refresh_token = 3;
  string doctor_id     = 4;
  string message       = 5;
}

// ── Doctor ───────────────────────────────────

message CreateDoctorRequest {
  string name           = 1;
  optional string clinic_id      = 2;
  string type           = 3;
  string specialization = 4;
  string email          = 5;
  string password       = 6;
}
message CreateDoctorResponse { string doctor_id = 1; string message = 2; }

message GetDoctorRequest  { string doctor_id = 1; }
message GetDoctorResponse {
  string doctor_id      = 1;
  string name           = 2;
  string type           = 3;
  string specialization = 4;
  string clinic_id      = 5;
  bool   is_active      = 6;
}

message DoctorExistsRequest  { string doctor_id = 1; }
message DoctorExistsResponse { bool exists = 1; }

message UpdateLocationRequest  { string doctor_id = 1; string location_text = 2; }
message UpdateLocationResponse { bool success = 1; string message = 2; }

// ── Clinic ───────────────────────────────────

message CreateClinicRequest  { string name = 1; string location_text = 2; }
message CreateClinicResponse { string clinic_id = 1; string message = 2; }

message GetByClinicRequest  { string clinic_id = 1; }
message GetByClinicResponse { repeated DoctorMessage doctors = 1; }

// ── Schedule ─────────────────────────────────

message CreateScheduleRequest {
  string          doctor_id             = 1;
  repeated string working_days          = 2;
  string          start_time            = 3;
  string          end_time              = 4;
  int32           slot_duration_minutes = 5;
  int32           max_appointments_day  = 6;
}
message CreateScheduleResponse { string message = 1; }

message GetScheduleRequest  { string doctor_id = 1; }
message GetScheduleResponse {
  string          doctor_id             = 1;
  repeated string working_days          = 2;
  string          start_time            = 3;
  string          end_time              = 4;
  int32           slot_duration_minutes = 5;
  int32           max_appointments_day  = 6;
}

// ── Location ─────────────────────────────────

message NearbyDoctorsRequest  { string location_text  = 1; }
message NearbyDoctorsResponse { repeated DoctorMessage doctors = 1; }

message ByLocationRequest  { string geohash_prefix = 1; }
message ByLocationResponse { repeated DoctorMessage doctors = 1; }

// ── Appointments ─────────────────────────────

message CreateAppointmentRequest {
  string doctor_id  = 1;
  string patient_id = 2;
  string date       = 3;
  string time       = 4;
}
message CreateAppointmentResponse {
  bool   success        = 1;
  string appointment_id = 2;
  string message        = 3;
}

message CancelAppointmentRequest {
  string appointment_id = 1;
  string patient_id     = 2;
  string doctor_id      = 3;
  string date           = 4;
  string time           = 5;
}
message CancelAppointmentResponse { bool success = 1; string message = 2; }

message GetAppointmentsRequest  { string doctor_id = 1; string date = 2; }
message GetAppointmentsResponse { repeated AppointmentMessage appointments = 1; }

message GetMyAppointmentsRequest  { string patient_id = 1; string date = 2; }
message GetMyAppointmentsResponse { repeated AppointmentMessage appointments = 1; }

message AppointmentActionRequest {
  string appointment_id = 1;
  string doctor_id      = 2;
  string patient_id     = 3;
  string date           = 4;
  string time           = 5;
  string current_status = 6;
}
message AppointmentActionResponse { bool success = 1; string message = 2; }

// ── Shared ───────────────────────────────────

message DoctorMessage {
  string doctor_id      = 1;
  string name           = 2;
  string type           = 3;
  string specialization = 4;
  bool   is_active      = 5;
}

message AppointmentMessage {
  string appointment_id = 1;
  string doctor_id      = 2;
  string patient_id     = 3;
  string date           = 4;
  string time           = 5;
  string status         = 6;
}