syntax = "proto3";

import "auth.proto";
import "doctor.proto";

option java_package = "com.health.grpc.patient";
option java_outer_classname = "PatientProto";
option java_multiple_files = true;

service PatientGrpcService {

  // Auth
  rpc PatientLogin         (PatientLoginRequest)   returns (PatientLoginResponse);
  rpc ValidatePatientToken (ValidateTokenRequest)  returns (ValidateTokenResponse);  // ← from auth.proto
  rpc RegisterPatient      (RegisterPatientRequest) returns (RegisterPatientResponse);

  // Patient
  rpc CreatePatient       (CreatePatientRequest)      returns (CreatePatientResponse);
  rpc GetPatient           (GetPatientRequest)     returns (GetPatientResponse);
  rpc PatientExists        (PatientExistsRequest)  returns (PatientExistsResponse);

  // Doctor discovery proxy
  rpc GetNearbyDoctors     (NearbyDoctorsProxyRequest) returns (NearbyDoctorsProxyResponse);
  rpc GetDoctorsByLocation (ByLocationProxyRequest)    returns (ByLocationProxyResponse);
  rpc GetDoctorSchedule    (ScheduleProxyRequest)      returns (ScheduleProxyResponse);

  // Appointments proxy
  rpc BookAppointment      (BookAppointmentRequest)    returns (BookAppointmentResponse);
  rpc CancelAppointment    (CancelAppointmentRequest)  returns (CancelAppointmentResponse);
  rpc GetMyAppointments    (MyAppointmentsRequest)     returns (MyAppointmentsResponse);
}

// ── Auth ─────────────────────────────────────
// ValidateTokenRequest and ValidateTokenResponse come from auth.proto

message PatientLoginRequest  { string email = 1; string password = 2; }
message PatientLoginResponse {
  bool   success       = 1;
  string access_token  = 2;
  string refresh_token = 3;
  string patient_id    = 4;
  string message       = 5;
}

message RegisterPatientRequest {
  string name     = 1;
  string email    = 2;
  string password = 3;
  string phone    = 4;
}
message RegisterPatientResponse { string patient_id = 1; string message = 2; }

// ── Patient ──────────────────────────────────
message CreatePatientRequest  { string name = 1; string email = 2; string phone = 3; string password = 4; }
message CreatePatientResponse { string patient_id = 1; string message = 2; }

message GetPatientRequest  { string patient_id = 1; }
message GetPatientResponse {
  string patient_id = 1;
  string name       = 2;
  string email      = 3;
  string phone      = 4;
}

message PatientExistsRequest  { string patient_id = 1; }
message PatientExistsResponse { bool exists = 1; }

// ── Doctor Discovery Proxy ───────────────────

message NearbyDoctorsProxyRequest  { string location_text = 1; }
message NearbyDoctorsProxyResponse { repeated DoctorInfo doctors = 1; }

message ByLocationProxyRequest  { string geohash_prefix = 1; }
message ByLocationProxyResponse { repeated DoctorInfo doctors = 1; }

message ScheduleProxyRequest  { string doctor_id = 1; }
message ScheduleProxyResponse {
  repeated string working_days          = 1;
  string          start_time            = 2;
  string          end_time              = 3;
  int32           slot_duration_minutes = 4;
  int32           max_appointments_day  = 5;
}

// ── Appointments Proxy ───────────────────────

message BookAppointmentRequest {
  string doctor_id  = 1;
  string patient_id = 2;
  string date       = 3;
  string time       = 4;
}
message BookAppointmentResponse {
  bool   success        = 1;
  string appointment_id = 2;
  string message        = 3;
}

message MyAppointmentsRequest  { string patient_id = 1; string date = 2; }
message MyAppointmentsResponse { repeated AppointmentInfo appointments = 1; }

// ── Shared ───────────────────────────────────

message DoctorInfo {
  string doctor_id      = 1;
  string name           = 2;
  enum Type   {
    TYPE_UNSPECIFIED = 0;
    INDIVIDUAL = 1;
    CLINIC_DOCTOR     = 2;
  }
  Type type = 3;
  string specialization = 4;
  bool   is_active      = 5;
}

message AppointmentInfo {
  string appointment_id = 1;
  string doctor_id      = 2;
  string patient_id     = 3;
  string date           = 4;
  string time           = 5;
  enum Status  {
    TYPE_UNSPECIFIED = 0;
    PENDING          = 1;
    ACCEPTED         = 2;
    CANCELLED        = 3;
    POSTPONED        = 4;
  }
  Status status = 6;
}