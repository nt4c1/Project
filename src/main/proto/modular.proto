syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.module";
option java_outer_classname = "Modular";
option objc_class_prefix = "HLW";

package com.module;

service ModularService {
  rpc send (ModularRequest) returns (ModularReply) {}
}

message ModularRequest {
  string name = 1;
}

message ModularReply {
  string message = 1;
}