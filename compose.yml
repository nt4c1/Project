services:
  scylla:
    image: scylladb/scylla:6.2
    container_name: scylla
    ports:
      - "9042:9042"
    command: --smp 1 --memory 512M --overprovisioned 1
    volumes:
      - scylla_data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7.4
    container_name: redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  nats:
    image: nats:2.10
    container_name: nats
    ports:
      - "4223:4222"
      - "8223:8222"
    command: --jetstream --http_port 8222
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  scylla_data:
  redis_data: